<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Plyndrox AI logo">
  <defs>
    <linearGradient id="plyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0815"/>
      <stop offset="55%" stop-color="#1A1140"/>
      <stop offset="100%" stop-color="#2A0E4A"/>
    </linearGradient>
    <radialGradient id="plyGlow" cx="0.72" cy="0.22" r="0.78">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plyGlow2" cx="0.25" cy="0.85" r="0.7">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petalWarm" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE3F3"/>
      <stop offset="45%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
    <linearGradient id="petalCool" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#CFFAFE"/>
      <stop offset="45%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="petalViolet" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="45%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="plyCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="75%" stop-color="#F4E9FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F4E9FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#plyBg)"/>
  <rect width="512" height="512" rx="116" fill="url(#plyGlow)"/>
  <rect width="512" height="512" rx="116" fill="url(#plyGlow2)"/>
  <g transform="translate(256 256)">
    <g style="mix-blend-mode: screen">
      <g transform="rotate(-30)">
        <ellipse cx="0" cy="-92" rx="58" ry="128" fill="url(#petalWarm)" opacity="0.92"/>
      </g>
      <g transform="rotate(90)">
        <ellipse cx="0" cy="-92" rx="58" ry="128" fill="url(#petalCool)" opacity="0.92"/>
      </g>
      <g transform="rotate(210)">
        <ellipse cx="0" cy="-92" rx="58" ry="128" fill="url(#petalViolet)" opacity="0.92"/>
      </g>
    </g>
    <circle cx="0" cy="0" r="62" fill="url(#plyCore)">
      <animate attributeName="r" values="58;76;58" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0; 0.5; 1"/>
      <animate attributeName="opacity" values="0.95;0.6;0.95" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0; 0.5; 1"/>
    </circle>
    <circle cx="0" cy="0" r="22" fill="#FFFFFF">
      <animate attributeName="r" values="22;25;22" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0; 0.5; 1"/>
    </circle>
    <circle cx="-7" cy="-7" r="7" fill="#FFFFFF" opacity="0.85">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" keyTimes="0; 0.5; 1"/>
    </circle>
  </g>
</svg>
