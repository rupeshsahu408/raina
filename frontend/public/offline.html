<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <title>Plyndrox AI — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090b;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo-wrap {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.6);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .wifi-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 28px;
      opacity: 0.35;
    }

    button {
      background: linear-gradient(135deg, #6d28d9, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.2px;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .tagline {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <img class="wifi-icon" src="/icons/plyndrox-192.png" alt="" aria-hidden="true"
       style="width:96px;height:96px;border-radius:22px;margin-bottom:28px;box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.6);" />

  <h1>You're Offline</h1>
  <p>Check your internet connection and try again. Plyndrox AI needs a connection to work its magic.</p>

  <button onclick="window.location.reload()">Try Again</button>

  <span class="tagline">Plyndrox AI &mdash; Every AI tool you need</span>
</body>
</html>
